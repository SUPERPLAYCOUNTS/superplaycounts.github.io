<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPERPLAYCOUNTS - 404</title>
    <meta name="description" content="Page not found on SUPERPLAYCOUNTS.">
    <meta name="theme-color" content="#c8c8c8">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="icon" href="/img/icon-sites.png">
    <style>
        @font-face {
            font-family: Fontsite;
            src: url('/fonts/Bebas-Neue.ttf');
        }

        :root {
            --bg: #f4f4f4;
            --surface: #ffffff;
            --text: #111111;
            --muted: #5a5a5a;
            --border: #202020;
            --accent: #e62b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fontsite', sans-serif;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 20%, rgba(230, 43, 43, 0.08), transparent 45%),
                radial-gradient(circle at 80% 80%, rgba(50, 50, 50, 0.06), transparent 40%),
                var(--bg);
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            background: var(--surface);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
            text-decoration: none;
            letter-spacing: 0.3px;
        }

        .brand img {
            width: 48px;
            height: 48px;
        }

        .brand h1 {
            font-size: 34px;
        }

        .notfound-main {
            min-height: calc(100vh - 68px);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .notfound-card {
            width: min(760px, 100%);
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
            padding: 28px 22px;
            text-align: center;
        }

        .code {
            font-size: clamp(70px, 16vw, 150px);
            color: var(--accent);
            line-height: 0.9;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 rgba(17, 17, 17, 0.15);
            margin-bottom: 10px;
        }

        h2 {
            font-size: clamp(30px, 5vw, 54px);
            line-height: 1;
            margin-bottom: 12px;
        }

        p {
            font-size: 24px;
            color: var(--muted);
            line-height: 1.25;
            max-width: 640px;
            margin: 0 auto;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 22px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s ease, background-color 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            background: #ececec;
        }

        .btn-primary {
            background: #ececec;
        }

        @media (max-width: 640px) {
            .brand h1 {
                font-size: 28px;
            }

            .brand img {
                width: 40px;
                height: 40px;
            }

            .notfound-card {
                padding: 22px 16px;
            }

            p {
                font-size: 21px;
            }

            .btn {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand" aria-label="Back to home">
            <img src="/img/icon-sites.png" alt="SUPERPLAYCOUNTS logo">
            <h1>SUPERPLAYCOUNTS</h1>
        </a>
    </header>

    <main class="notfound-main">
        <section class="notfound-card" aria-live="polite">
            <div class="code">404</div>
            <h2>Page Not Found</h2>
            <p>The page may have been moved, deleted, or the URL is incorrect.</p>
            <div class="actions">
                <a class="btn btn-primary" href="/">Go Home</a>
                <!-- <a class="btn" href="/youtube/search.html">YouTube Search</a>
                <a class="btn" href="/x/search.html">X Search</a>
                <a class="btn" href="/tiktok/search.html">TikTok Search</a> -->
            </div>
        </section>
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/serviceWorker.js').catch(function () {});
            });
        }
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B5TEVSVZ74"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);} 
      gtag('js', new Date());
      gtag('config', 'G-B5TEVSVZ74');
    </script>
</body>
</html>
