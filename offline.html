<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPERPLAYCOUNTS - Offline</title>
    <meta name="theme-color" content="#c8c8c8">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="icon" href="/img/icon-sites.png">
    <style>
        @font-face {
            font-family: Fontsite;
            src: url('/fonts/Bebas-Neue.ttf');
        }

        :root {
            --bg: #f4f4f4;
            --surface: #ffffff;
            --text: #111111;
            --muted: #5a5a5a;
            --border: #202020;
            --accent: #e62b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fontsite', sans-serif;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 20%, rgba(230, 43, 43, 0.08), transparent 45%),
                radial-gradient(circle at 80% 80%, rgba(50, 50, 50, 0.06), transparent 40%),
                var(--bg);
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            background: var(--surface);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
            text-decoration: none;
            letter-spacing: 0.3px;
        }

        .brand img {
            width: 48px;
            height: 48px;
        }

        .brand h1 {
            font-size: 34px;
        }

        .offline-main {
            min-height: calc(100vh - 68px);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .offline-card {
            width: min(640px, 100%);
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
            padding: 28px 22px;
            text-align: center;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #d9d9d9;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 20px;
            color: #222;
            margin-bottom: 12px;
            background: #fafafa;
        }

        .status::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 5px rgba(230, 43, 43, 0.16);
        }

        h2 {
            font-size: clamp(34px, 5vw, 54px);
            line-height: 1;
            margin-bottom: 10px;
        }

        p {
            font-size: 24px;
            color: var(--muted);
            line-height: 1.25;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 22px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s ease, background-color 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            background: #ececec;
        }

        .hint {
            margin-top: 18px;
            font-size: 19px;
            color: #6b6b6b;
        }

        @media (max-width: 640px) {
            .brand h1 {
                font-size: 28px;
            }

            .brand img {
                width: 40px;
                height: 40px;
            }

            .offline-card {
                padding: 22px 16px;
            }

            p {
                font-size: 21px;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand" aria-label="Back to home">
            <img src="/img/icon-sites.png" alt="SUPERPLAYCOUNTS logo">
            <h1>SUPERPLAYCOUNTS</h1>
        </a>
    </header>

    <main class="offline-main">
        <section class="offline-card" aria-live="polite">
            <div class="status">Offline mode</div>
            <h2>No Internet Connection</h2>
            <p>This page is shown because your device is currently offline.</p>
            <div class="actions">
                <button class="btn" type="button" onclick="window.location.reload()">Try Again</button>
                <a class="btn" href="/">Open Home</a>
            </div>
            <p class="hint">When your internet returns, this page can refresh automatically.</p>
        </section>
    </main>

    <script>
        window.addEventListener('online', function () {
            window.location.reload();
        });
    </script>
</body>
</html>
